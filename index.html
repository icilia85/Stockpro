<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Pro V28 - Relatórios Filtrados</title>
    <style>
        :root { --primary: #2563eb; --success: #22c55e; --danger: #ef4444; --warning: #f59e0b; --dark: #1e293b; --bg: #f8fafc; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; background: var(--bg); color: var(--dark); padding-bottom: 70px; }

        header { background: var(--primary); color: white; padding: 1rem; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        nav { display: flex; background: white; border-bottom: 1px solid #e2e8f0; position: sticky; top: 0; z-index: 10; overflow-x: auto; scrollbar-width: none; }
        nav button { flex: 1; padding: 15px 12px; border: none; background: none; font-size: 11px; font-weight: 700; color: #64748b; white-space: nowrap; cursor: pointer; border-bottom: 3px solid transparent; }
        nav button.active { color: var(--primary); border-bottom-color: var(--primary); }

        .section { display: none; padding: 15px; max-width: 900px; margin: auto; }
        .active-section { display: block; }
        .card { background: white; padding: 20px; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        h3 { margin-top: 0; font-size: 16px; border-left: 4px solid var(--primary); padding-left: 10px; margin-bottom: 15px; }
        
        .filter-group { background: #f1f5f9; padding: 15px; border-radius: 12px; margin-bottom: 15px; }
        label { display: block; font-size: 11px; font-weight: bold; color: #64748b; margin-bottom: 5px; text-transform: uppercase; }

        input, select { width: 100%; padding: 12px; margin-bottom: 12px; border: 1px solid #cbd5e1; border-radius: 10px; font-size: 14px; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; font-size: 14px; transition: 0.2s; }
        .btn:active { opacity: 0.8; }
        
        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 500px; }
        th { text-align: left; padding: 12px; font-size: 11px; background: #f8fafc; color: #64748b; border-bottom: 2px solid #e2e8f0; }
        td { padding: 12px; border-bottom: 1px solid #f1f5f9; font-size: 13px; }

        .btn-edit { background: var(--warning); color: white; border: none; padding: 6px 10px; border-radius: 6px; cursor: pointer; }
        
        #camada-impressao { display: none; position: fixed; inset: 0; background: white; z-index: 10000; overflow-y: auto; padding: 20px; }
        
        @media print {
            body * { visibility: hidden; }
            #camada-impressao, #camada-impressao * { visibility: visible; }
            #camada-impressao { position: absolute; top: 0; left: 0; width: 100%; padding: 0; }
            .no-print { display: none !important; }
        }
    </style>
</head>
<body>

<div id="ui-app">
    <header>
        <span>STOCK MANAGER V28</span>
        <button onclick="ativarModoImpressao()" style="background:var(--success); color:white; border:none; border-radius:8px; padding:8px 15px; font-weight:bold;">🖨️ PDF</button>
    </header>

    <nav>
        <button onclick="tab('movs')" id="nav-movs" class="active">LANÇAR</button>
        <button onclick="tab('stock')" id="nav-stock">STOCK REAL</button>
        <button onclick="tab('rel')" id="nav-rel">RELATÓRIO</button>
        <button onclick="tab('prods')" id="nav-prods">PRODUTOS</button>
        <button onclick="tab('sys')" id="nav-sys">SISTEMA</button>
    </nav>

    <!-- LANÇAMENTOS -->
    <section id="sec-movs" class="section active-section">
        <div class="card">
            <h3 id="titulo-mov">Novo Registo</h3>
            <input type="hidden" id="m-edit-idx">
            <label>Data</label><input type="date" id="m-data">
            <label>Produto</label><select id="m-prod"></select>
            <label>Tipo</label>
            <select id="m-tipo">
                <option value="ENTRADA">Produção (+)</option>
                <option value="SAIDA">Venda / Saída (-)</option>
                <option value="ACERTO">Acerto Manual (Substitui Stock)</option>
            </select>
            <label>Quantidade</label><input type="number" id="m-qtd" placeholder="0">
            <button class="btn" style="background:var(--primary)" id="btn-save-mov" onclick="addMov()">GUARDAR REGISTO</button>
            <button class="btn" style="background:var(--danger); display:none; margin-top:5px;" id="btn-cancel-edit" onclick="cancelarEdicaoMov()">CANCELAR EDIÇÃO</button>
        </div>
    </section>

    <!-- STOCK EM TEMPO REAL -->
    <section id="sec-stock" class="section">
        <div class="card">
            <h3>Consultar Inventário</h3>
            <div class="filter-group">
                <label>Filtrar por Produto:</label>
                <select id="filtro-stock-prod" onchange="renderStock()" style="margin-bottom:0;"></select>
            </div>
            <div id="area-print-stock" class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Produto</th>
                            <th>Inicial</th>
                            <th>Entradas</th>
                            <th>Saídas</th>
                            <th>Stock Atual</th>
                        </tr>
                    </thead>
                    <tbody id="tbody-stock"></tbody>
                </table>
            </div>
        </div>
    </section>

    <!-- RELATÓRIO COM FILTROS -->
    <section id="sec-rel" class="section">
        <div class="card">
            <h3>Gerar Histórico de Movimentos</h3>
            <div class="filter-group">
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <div><label>De:</label><input type="date" id="r-ini"></div>
                    <div><label>Até:</label><input type="date" id="r-fim"></div>
                </div>
                <label>Produto:</label>
                <select id="r-filtro-prod" style="margin-bottom:0;"></select>
            </div>
            <button class="btn" style="background:var(--dark);" onclick="renderRel()">FILTRAR E GERAR LISTA</button>
        </div>
        
        <div class="card" id="area-print-rel" style="display:none;">
            <h3 id="titulo-lista-rel">Listagem de Movimentos</h3>
            <div class="table-container">
                <table>
                    <thead><tr><th>Data</th><th>Produto</th><th>Tipo</th><th>Qtd</th><th class="no-print">Ação</th></tr></thead>
                    <tbody id="tbody-rel"></tbody>
                </table>
            </div>
        </div>
    </section>

    <!-- PRODUTOS -->
    <section id="sec-prods" class="section">
        <div class="card">
            <h3>Gestão de Artigos</h3>
            <input type="hidden" id="p-id">
            <label>Nome do Artigo</label><input type="text" id="p-nome">
            <label>Stock Inicial</label><input type="number" id="p-ini" value="0">
            <button class="btn" style="background:var(--primary)" onclick="saveProd()">SALVAR PRODUTO</button>
        </div>
        <div class="card">
            <div class="table-container">
                <table>
                    <thead><tr><th>Nome</th><th>Inicial</th><th>Ações</th></tr></thead>
                    <tbody id="tbody-prods"></tbody>
                </table>
            </div>
        </div>
    </section>

    <!-- SISTEMA -->
    <section id="sec-sys" class="section">
        <div class="card">
            <h3>Dados e Segurança</h3>
            <button class="btn" style="background:#475569; margin-bottom:10px;" onclick="exportDB()">DESCARREGAR BACKUP</button>
            <button class="btn" style="background:#94a3b8" onclick="document.getElementById('f-imp').click()">IMPORTAR BACKUP</button>
            <input type="file" id="f-imp" style="display:none" onchange="importDB(event)">
            <hr style="margin:20px 0; border:0; border-top:1px solid #eee;">
            <button class="btn" style="background:var(--danger)" onclick="clearDB()">LIMPAR BASE DE DADOS</button>
        </div>
    </section>
</div>

<!-- ECRÃ DE IMPRESSÃO -->
<div id="camada-impressao">
    <div class="controles-print no-print" style="margin-bottom:20px; display:flex; gap:10px;">
        <button onclick="fecharModoImpressao()" style="padding:12px; background:var(--danger); color:white; border:none; border-radius:10px; flex:1; font-weight:bold;">VOLTAR</button>
        <button onclick="window.print()" style="padding:12px; background:var(--success); color:white; border:none; border-radius:10px; flex:2; font-weight:bold;">CONFIRMAR PDF</button>
    </div>
    <div id="conteudo-para-imprimir"></div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('STK_PRO_V28')) || { prods: [], movs: [] };

    function save() { 
        localStorage.setItem('STK_PRO_V28', JSON.stringify(db)); 
        refreshDropdowns();
        renderProds();
        renderStock();
    }

    function tab(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active-section'));
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        document.getElementById('sec-' + id).classList.add('active-section');
        document.getElementById('nav-' + id).classList.add('active');
    }

    // --- PRODUTOS ---
    function saveProd() {
        const id = document.getElementById('p-id').value, n = document.getElementById('p-nome').value.trim(), i = parseInt(document.getElementById('p-ini').value) || 0;
        if(!n) return;
        if(id === "") db.prods.push({ nome: n, ini: i });
        else db.prods[id] = { nome: n, ini: i };
        document.getElementById('p-id').value = ""; document.getElementById('p-nome').value = "";
        save();
    }

    function renderProds() {
        const tb = document.getElementById('tbody-prods'); tb.innerHTML = '';
        db.prods.forEach((p, i) => {
            tb.innerHTML += `<tr><td>${p.nome}</td><td>${p.ini}</td><td>
                <button class="btn-edit" onclick="editProd(${i})" style="background:orange;">ED</button>
                <button class="btn-edit" onclick="delProd(${i})" style="background:red;">X</button>
            </td></tr>`;
        });
    }

    function editProd(i) {
        document.getElementById('p-id').value = i;
        document.getElementById('p-nome').value = db.prods[i].nome;
        document.getElementById('p-ini').value = db.prods[i].ini;
        tab('prods');
    }

    function delProd(i) {
        if(confirm("Apagar produto e movimentos relacionados?")) {
            db.movs = db.movs.filter(m => m.p !== db.prods[i].nome);
            db.prods.splice(i, 1);
            save();
        }
    }

    // --- MOVIMENTOS ---
    function addMov() {
        const d = document.getElementById('m-data').value, p = document.getElementById('m-prod').value, t = document.getElementById('m-tipo').value, q = parseInt(document.getElementById('m-qtd').value);
        const idx = document.getElementById('m-edit-idx').value;
        if(!d || !p || isNaN(q)) return alert("Preencha todos os campos!");

        if(idx === "") db.movs.unshift({ d, p, t, q });
        else { db.movs[idx] = { d, p, t, q }; cancelarEdicaoMov(); }
        save();
        document.getElementById('m-qtd').value = "";
        alert("Guardado!");
    }

    function editarMov(idx) {
        const m = db.movs[idx];
        document.getElementById('m-edit-idx').value = idx;
        document.getElementById('m-data').value = m.d;
        document.getElementById('m-prod').value = m.p;
        document.getElementById('m-tipo').value = m.t;
        document.getElementById('m-qtd').value = m.q;
        document.getElementById('titulo-mov').innerText = "✏️ EDITAR REGISTO";
        document.getElementById('btn-save-mov').innerText = "ATUALIZAR";
        document.getElementById('btn-cancel-edit').style.display = "block";
        tab('movs');
    }

    function cancelarEdicaoMov() {
        document.getElementById('m-edit-idx').value = "";
        document.getElementById('titulo-mov').innerText = "Novo Registo";
        document.getElementById('btn-save-mov').innerText = "GUARDAR REGISTO";
        document.getElementById('btn-cancel-edit').style.display = "none";
    }

    // --- RENDERS ESPECÍFICOS ---
    function refreshDropdowns() {
        const sM = document.getElementById('m-prod');
        const sS = document.getElementById('filtro-stock-prod');
        const sR = document.getElementById('r-filtro-prod');
        
        const opts = '<option value="TODOS">--- TODOS OS PRODUTOS ---</option>';
        const vS = sS.value; const vR = sR.value;

        sM.innerHTML = '<option value="">Selecione...</option>';
        sS.innerHTML = opts;
        sR.innerHTML = opts;

        db.prods.sort((a,b)=>a.nome.localeCompare(b.nome)).forEach(p => {
            const html = `<option value="${p.nome}">${p.nome}</option>`;
            sM.innerHTML += html; sS.innerHTML += html; sR.innerHTML += html;
        });
        
        if(vS) sS.value = vS;
        if(vR) sR.value = vR;
    }

    function renderStock() {
        const f = document.getElementById('filtro-stock-prod').value;
        const tb = document.getElementById('tbody-stock'); tb.innerHTML = '';

        db.prods.forEach(p => {
            if (f !== "TODOS" && p.nome !== f) return;
            let atual = p.ini, ents = 0, sais = 0;
            [...db.movs].reverse().filter(m => m.p === p.nome).forEach(m => {
                if(m.t === 'ENTRADA') { atual += m.q; ents += m.q; }
                else if(m.t === 'SAIDA') { atual -= m.q; sais += m.q; }
                else if(m.t === 'ACERTO') { atual = m.q; }
            });
            tb.innerHTML += `<tr><td><b>${p.nome}</b></td><td>${p.ini}</td><td style="color:green">+${ents}</td><td style="color:red">-${sais}</td><td style="font-weight:bold; color:blue;">${atual}</td></tr>`;
        });
    }

    function renderRel() {
        const ini = document.getElementById('r-ini').value, fim = document.getElementById('r-fim').value, filtroProd = document.getElementById('r-filtro-prod').value;
        if(!ini || !fim) return alert("Escolha o intervalo de datas");
        
        const tb = document.getElementById('tbody-rel'); tb.innerHTML = '';
        db.movs.forEach((m, idx) => {
            const dataOk = m.d >= ini && m.d <= fim;
            const prodOk = (filtroProd === "TODOS" || m.p === filtroProd);
            
            if(dataOk && prodOk) {
                tb.innerHTML += `<tr><td>${m.d}</td><td>${m.p}</td><td>${m.t}</td><td>${m.q}</td><td class="no-print">
                    <button class="btn-edit" onclick="editarMov(${idx})">✏️</button>
                </td></tr>`;
            }
        });
        document.getElementById('titulo-lista-rel').innerText = filtroProd === "TODOS" ? "Listagem Geral" : "Histórico: " + filtroProd;
        document.getElementById('area-print-rel').style.display = 'block';
    }

    // --- IMPRESSÃO ---
    function ativarModoImpressao() {
        const ativo = document.querySelector('.active-section').id;
        let html = "";
        if(ativo === 'sec-stock') html = "<h2>Relatório de Stock</h2>" + document.getElementById('area-print-stock').innerHTML;
        else if(ativo === 'sec-rel') html = "<h2>Relatório de Movimentos</h2>" + document.getElementById('area-print-rel').innerHTML;
        else return alert("Vá para STOCK ou RELATÓRIO");
        
        document.getElementById('conteudo-para-imprimir').innerHTML = html;
        document.getElementById('camada-impressao').style.display = 'block';
        document.getElementById('ui-app').style.display = 'none';
    }

    function fecharModoImpressao() {
        document.getElementById('camada-impressao').style.display = 'none';
        document.getElementById('ui-app').style.display = 'block';
    }

    // --- SISTEMA ---
    function exportDB() {
        const blob = new Blob([JSON.stringify(db)], { type: 'application/json' });
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'stock_v28.json'; a.click();
    }
    function importDB(e) {
        const reader = new FileReader();
        reader.onload = (f) => { db = JSON.parse(f.target.result); save(); alert("Dados restaurados!"); };
        reader.readAsText(e.target.files[0]);
    }
    function clearDB() { if(confirm("Apagar tudo?")) { db = { prods: [], movs: [] }; save(); } }

    document.getElementById('m-data').valueAsDate = new Date();
    refreshDropdowns(); renderProds(); renderStock();
</script>
</body>
</html>
